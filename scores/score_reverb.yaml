samples:
  clip_a:
    from: 0.5
    to: 2.0
  clip_b:
    from: 2.0
    to: 4.0


dynamics:
  - t: 0.0
    mark: p
  - from: 0.5
    to: 3.0
    mark: crescendo
  - t: 3.0
    mark: f
  - from: 6.0
    to: 8.0
    mark: decrescendo
  - t: 8.0
    mark: pp

events:
  - sample: clip_a
    t: 0.5
    speed: 1.0
    gain_db: -6
    fx:
      - type: reverb
        reverberance: 70

  - sample: clip_b
    t: 3.0
    speed: 1.0
    gain_db: -6
    fx:
      - type: reverb
        reverberance: 80
