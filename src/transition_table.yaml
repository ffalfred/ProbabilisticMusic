  f_mf_any:
    R: [4.0, 6.0, 8.0]

  mp_mf_any:
    R: [5.0, 7.0, 9.0]

  # ── Stable / repeated markings — resist change ──────────────────────────────
  mp_mp_any:
    R: [8.0, 10.0, 12.0]

  mf_mf_any:
