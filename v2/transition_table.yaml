# transition_table.yaml
# Expert priors for every dynamic transition.
# mean and std define the Gaussian emission for each output parameter.
# All gain_db values are relative offsets from a nominal 0dB reference.

transitions:

  # --- Small steps up ---
  p_to_mp:
    type: continuous
    gain_db:          {mean: -2.0,  std: 1.0}
    brightness:       {mean:  0.1,  std: 0.05}
    timing_offset_ms: {mean:  5.0,  std: 3.0}
    attack_shape:     {mean:  0.1,  std: 0.05}
    reverb_wet:       {mean: -0.05, std: 0.02}

  mp_to_mf:
    type: continuous
    gain_db:          {mean: -2.0,  std: 1.0}
    brightness:       {mean:  0.1,  std: 0.05}
    timing_offset_ms: {mean:  5.0,  std: 3.0}
    attack_shape:     {mean:  0.1,  std: 0.05}
    reverb_wet:       {mean: -0.05, std: 0.02}

  mf_to_f:
    type: continuous
    gain_db:          {mean: -3.0,  std: 1.5}
    brightness:       {mean:  0.15, std: 0.07}
    timing_offset_ms: {mean:  8.0,  std: 4.0}
    attack_shape:     {mean:  0.15, std: 0.07}
    reverb_wet:       {mean: -0.05, std: 0.02}

  f_to_ff:
    type: continuous
    gain_db:          {mean: -3.0,  std: 1.5}
    brightness:       {mean:  0.15, std: 0.07}
    timing_offset_ms: {mean:  8.0,  std: 4.0}
    attack_shape:     {mean:  0.15, std: 0.07}
    reverb_wet:       {mean: -0.05, std: 0.02}

  ff_to_fff:
    type: continuous
    gain_db:          {mean: -2.0,  std: 1.0}
    brightness:       {mean:  0.1,  std: 0.05}
    timing_offset_ms: {mean:  5.0,  std: 3.0}
    attack_shape:     {mean:  0.1,  std: 0.05}
    reverb_wet:       {mean: -0.03, std: 0.01}

  pp_to_p:
    type: continuous
    gain_db:          {mean: -1.5,  std: 0.8}
    brightness:       {mean:  0.08, std: 0.04}
    timing_offset_ms: {mean:  4.0,  std: 2.0}
    attack_shape:     {mean:  0.08, std: 0.04}
    reverb_wet:       {mean: -0.03, std: 0.01}

  ppp_to_pp:
    type: continuous
    gain_db:          {mean: -1.0,  std: 0.6}
    brightness:       {mean:  0.05, std: 0.03}
    timing_offset_ms: {mean:  3.0,  std: 1.5}
    attack_shape:     {mean:  0.05, std: 0.03}
    reverb_wet:       {mean: -0.02, std: 0.01}

  # --- Large steps up ---
  p_to_f:
    type: continuous
    gain_db:          {mean: -1.0,  std: 2.0}
    brightness:       {mean:  0.25, std: 0.12}
    timing_offset_ms: {mean: 20.0,  std: 8.0}
    attack_shape:     {mean:  0.3,  std: 0.1}
    reverb_wet:       {mean: -0.1,  std: 0.04}

  pp_to_ff:
    type: continuous
    gain_db:          {mean:  0.0,  std: 3.0}
    brightness:       {mean:  0.4,  std: 0.15}
    timing_offset_ms: {mean: 30.0,  std: 12.0}
    attack_shape:     {mean:  0.4,  std: 0.15}
    reverb_wet:       {mean: -0.15, std: 0.05}

  p_to_ff:
    type: continuous
    gain_db:          {mean:  0.5,  std: 2.5}
    brightness:       {mean:  0.35, std: 0.15}
    timing_offset_ms: {mean: 25.0,  std: 10.0}
    attack_shape:     {mean:  0.35, std: 0.12}
    reverb_wet:       {mean: -0.12, std: 0.05}

  # --- Small steps down ---
  f_to_mf:
    type: continuous
    gain_db:          {mean:  2.0,  std: 1.0}
    brightness:       {mean: -0.1,  std: 0.05}
    timing_offset_ms: {mean: -5.0,  std: 3.0}
    attack_shape:     {mean: -0.1,  std: 0.05}
    reverb_wet:       {mean:  0.05, std: 0.02}

  mf_to_mp:
    type: continuous
    gain_db:          {mean:  2.0,  std: 1.0}
    brightness:       {mean: -0.1,  std: 0.05}
    timing_offset_ms: {mean: -5.0,  std: 3.0}
    attack_shape:     {mean: -0.1,  std: 0.05}
    reverb_wet:       {mean:  0.05, std: 0.02}

  mp_to_p:
    type: continuous
    gain_db:          {mean:  1.5,  std: 0.8}
    brightness:       {mean: -0.08, std: 0.04}
    timing_offset_ms: {mean: -4.0,  std: 2.0}
    attack_shape:     {mean: -0.08, std: 0.04}
    reverb_wet:       {mean:  0.03, std: 0.01}

  # --- Large steps down ---
  f_to_p:
    type: continuous
    gain_db:          {mean:  4.0,  std: 2.0}
    brightness:       {mean: -0.25, std: 0.12}
    timing_offset_ms: {mean: -15.0, std: 8.0}
    attack_shape:     {mean: -0.3,  std: 0.1}
    reverb_wet:       {mean:  0.1,  std: 0.04}

  ff_to_pp:
    type: continuous
    gain_db:          {mean:  5.0,  std: 3.0}
    brightness:       {mean: -0.4,  std: 0.15}
    timing_offset_ms: {mean: -25.0, std: 12.0}
    attack_shape:     {mean: -0.4,  std: 0.15}
    reverb_wet:       {mean:  0.15, std: 0.05}

  ff_to_p:
    type: continuous
    gain_db:          {mean:  6.0,  std: 3.0}
    brightness:       {mean: -0.45, std: 0.18}
    timing_offset_ms: {mean: -28.0, std: 12.0}
    attack_shape:     {mean: -0.45, std: 0.15}
    reverb_wet:       {mean:  0.18, std: 0.06}

  # --- Sudden changes ---
  any_to_subito_f:
    type: discontinuous
    gain_db:          {mean:  0.0,  std: 4.0}
    brightness:       {mean:  0.5,  std: 0.2}
    timing_offset_ms: {mean:  0.0,  std: 2.0}
    attack_shape:     {mean:  0.9,  std: 0.1}
    reverb_wet:       {mean: -0.2,  std: 0.08}

  any_to_subito_p:
    type: discontinuous
    gain_db:          {mean:  5.0,  std: 4.0}
    brightness:       {mean: -0.5,  std: 0.2}
    timing_offset_ms: {mean:  0.0,  std: 2.0}
    attack_shape:     {mean: -0.5,  std: 0.1}
    reverb_wet:       {mean:  0.2,  std: 0.08}

  # --- Sforzando ---
  any_to_sfz:
    type: shadow
    gain_db:          {mean: -0.5,  std: 1.5}
    brightness:       {mean:  0.6,  std: 0.1}
    timing_offset_ms: {mean:  0.0,  std: 2.0}
    attack_shape:     {mean:  1.0,  std: 0.05}
    reverb_wet:       {mean: -0.1,  std: 0.04}
    sfz_recovery:
      length: 2
      gain_bias: -4.0
      brightness_bias: -0.15

  # --- Forte-piano ---
  any_to_fp:
    type: discontinuous
    gain_db:          {mean: -1.0,  std: 2.0}
    brightness:       {mean:  0.4,  std: 0.15}
    timing_offset_ms: {mean:  0.0,  std: 3.0}
    attack_shape:     {mean:  0.8,  std: 0.1}
    reverb_wet:       {mean:  0.1,  std: 0.05}

  # --- Neutral / fallback ---
  any_to_mf:
    type: continuous
    gain_db:          {mean:  0.0,  std: 1.5}
    brightness:       {mean:  0.0,  std: 0.05}
    timing_offset_ms: {mean:  0.0,  std: 3.0}
    attack_shape:     {mean:  0.0,  std: 0.05}
    reverb_wet:       {mean:  0.0,  std: 0.02}

  # --- Crescendo / Decrescendo ---
  # These span a duration defined in the score.
  # The emission defines the *rate* of change, not a single value.
  cresc:
    type: continuous
    gain_db_per_sec:      {mean:  1.5,  std: 0.3}
    brightness_per_sec:   {mean:  0.03, std: 0.01}

  decresc:
    type: continuous
    gain_db_per_sec:      {mean: -1.5,  std: 0.3}
    brightness_per_sec:   {mean: -0.03, std: 0.01}
